# Ghostty — Recommended settings for pmux.sh
# Copy the settings you want into ~/.config/ghostty/config

# ── Font ────────────────────────────────────────────────
font-family = JetBrains Mono
font-size = 14

# ── Window / Tab behavior ───────────────────────────────
window-decoration = true
window-padding-x = 16
window-padding-y = 12

# Enable native tab bar (supports double-click rename)
gtk-tabs-location = top
macos-titlebar-style = tabs

# ── Tab keybindings ─────────────────────────────────────
# These are Ghostty defaults — listed for reference
# New tab:     Cmd+T
# Close tab:   Cmd+W
# Next tab:    Cmd+Shift+]
# Prev tab:    Cmd+Shift+[
# Split right: Cmd+D
# Split down:  Cmd+Shift+D

# ── Theme (dark) ────────────────────────────────────────
# background = 1e1e2e
# foreground = cdd6f4
# You can set any Ghostty theme or use a custom palette

# ── Shell integration ───────────────────────────────────
shell-integration = zsh
